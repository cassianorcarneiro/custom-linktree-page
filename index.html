<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Profile</title>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-6T4SEM3NSE"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-6T4SEM3NSE');
  </script>

  <style>
    :root {
      --bg: #1f2730;
      --fg: #fff;
      --card: #eaeaea;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f2f5f8;
        --fg: #1a1a1a;
        --card: #fff;
      }
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      color: var(--fg);
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #445c77 0%, #11161b 60%, #07090b 100%);
      background-attachment: fixed;
      background-size: cover;
      overscroll-behavior: none;
    }

    main {
      width: 90%;
      max-width: 380px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fade .9s ease;
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; }
    }

    .avatar {
      width: 104px;
      height: 104px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, .25);
      animation: pop .7s ease;
    }

    @keyframes pop {
      from { transform: scale(.6); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .username {
      font-weight: 600;
      letter-spacing: 1.4px;
      font-size: 1.2rem;
      margin-bottom: 40px;
      opacity: .9;
    }

    .content-wrapper {
      display: grid;
      grid-auto-rows: auto;
      justify-content: center;
      width: max-content;
      margin: 0 auto;
    }

    .icons {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-bottom: 30px;
      align-items: center;
    }

    .icon {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      cursor: pointer;
      background: rgba(255, 255, 255, .08);
      backdrop-filter: blur(12px) saturate(160%);
      -webkit-backdrop-filter: blur(12px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, .18);
      box-shadow:
        0 6px 18px rgba(0, 0, 0, .25),
        inset 0 1px 1px rgba(255, 255, 255, .2),
        inset 0 -2px 4px rgba(0, 0, 0, .15);
      transform-origin: center;
      touch-action: manipulation;
      will-change: transform;
      transition:
        transform .15s linear,
        box-shadow .25s;
    }

    .icon svg {
      width: 22px;
      fill: white;
      opacity: .92;
      pointer-events: none;
    }

    .icon:hover {
      transform: translateY(-6px) scale(1.1);
      box-shadow:
        0 12px 25px rgba(0, 0, 0, .35),
        inset 0 1px 2px rgba(255, 255, 255, .3),
        inset 0 -2px 6px rgba(0, 0, 0, .2);
    }

    .button {
      display: block;
      width: 100%;
      justify-self: stretch;
      text-decoration: none;
      padding: 4px;
      border-radius: 30px;
      background: linear-gradient(90deg, #f4e66a, #7de1d1);
      transition: transform .25s;
    }

    .button:hover {
      transform: scale(1.03);
    }

    .button span {
      display: block;
      padding: 12px 20px;
      border-radius: 30px;
      font-weight: 700;
      letter-spacing: 1.4px;
      font-size: .95rem;
      background: var(--card);
      color: #2f3a46;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>

<body>

  <main>
    <img
      src="avatar.jpg"
      class="avatar"
      alt="User avatar"
      loading="lazy"
      decoding="async"
    />

    <div id="username" class="username"></div>

    <div class="content-wrapper">
      <div class="icons" id="icons"></div>

      <a id="mainButton" class="button" target="_blank" rel="noopener">
        <span></span>
      </a>
    </div>
  </main>

  <script>
    async function loadConfig() {
      try {
        const response = await fetch("config.json");
        
        if (!response.ok) throw new Error("config.json not found");
        
        const config = await response.json();
        renderProfile(config);
      } catch (err) {
        console.error("Config loading failed:", err);
        document.getElementById("username").textContent = "Profile";
      }
    }

    function renderProfile(config) {
      const username = document.getElementById("username");
      const iconsContainer = document.getElementById("icons");
      const button = document.getElementById("mainButton");

      username.textContent = config.username || "Profile";

      button.href = config.button?.url || "#";
      button.firstElementChild.textContent = config.button?.text || "Open";

      iconsContainer.innerHTML = "";

      (config.links || []).forEach(link => {
        if (!link?.url) return;

        const a = document.createElement("a");

        a.className = "icon";
        a.href = link.url;
        a.target = "_blank";
        a.rel = "noopener";
        a.setAttribute("aria-label", link.name || "link");
        a.setAttribute("title", link.name || "");

        const wrapper = document.createElement("span");
        wrapper.innerHTML = link.svg || "";

        if (wrapper.firstElementChild) {
          a.appendChild(wrapper.firstElementChild);
        }

        a.addEventListener("click", () => track(link.name));
        iconsContainer.appendChild(a);
      });

      initIconAnimations();
    }

    function track(label) {
      if (typeof gtag === "function") {
        gtag("event", "click", {
          event_category: "link",
          event_label: label
        });
      }
    }

    function initIconAnimations() {
      const supportsHover = window.matchMedia("(hover: hover)").matches;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      if (!supportsHover || reducedMotion) return;

      document.querySelectorAll(".icon").forEach(el => {
        let x = 0;
        let y = 0;
        let dx = 0;
        let dy = 0;

        el.addEventListener("mousemove", e => {
          const r = el.getBoundingClientRect();
          x = (e.clientX - r.left - r.width / 2) / 10;
          y = (e.clientY - r.top - r.height / 2) / 10;
        });

        function animate() {
          dx += (x - dx) * 0.15;
          dy += (y - dy) * 0.15;
          el.style.transform = `translate(${dx}px, ${dy}px)`;
          requestAnimationFrame(animate);
        }

        animate();

        el.addEventListener("mouseleave", () => {
          x = 0;
          y = 0;
        });
      });
    }

    loadConfig();
  </script>

</body>
</html>
